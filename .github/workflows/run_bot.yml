name: Crypto Exchanges Bot Pipeline

on:
  schedule:
    - cron: '*/5 * * * *' # اجرای خودکار هر 5 دقیقه یک‌بار
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  run-exchange-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install python-telegram-bot==20.8; fi

    - name: Run Exchanges Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add sent_exchange_links.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update exchange history [skip ci]" && git push)
