name: Crypto Monitor Pipeline

on:
  schedule:
    - cron: '*/5 * * * *' # اجرای خودکار هر 5 دقیقه یک‌بار
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  run-crypto-bots:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install python-telegram-bot==20.8

    - name: Run Projects Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py # اجرای ربات پروژه‌های بنیادی

    - name: Run Exchanges Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python exchange_bot.py # اجرای ربات لیستینگ صرافی‌ها

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        # اضافه کردن هر دو فایل تاریخچه برای ذخیره‌سازی
        git add sent_links.txt sent_exchange_links.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update monitor logs [skip ci]" && git push)
